name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate icon
        run: |
          pip install pillow -q
          make icon

      # Bebbo-built binaries hang on launch on real Amiga / FS-UAE
      # (libnix collides with the user-declared library-base globals
      # in src/main.c). Bartman's m68k-amiga-elf-gcc + elf2hunk path
      # works.  We fetch the toolchain from Bartman's amiga-debug
      # VS Code extension, which bundles a Linux build of GCC and
      # elf2hunk under bin/linux/.
      - name: Cache Bartman toolchain
        id: bartman-cache
        uses: actions/cache@v4
        with:
          path: bartman
          key: bartman-amiga-debug-1.8.2

      - name: Fetch Bartman toolchain
        if: steps.bartman-cache.outputs.cache-hit != 'true'
        env:
          BARTMAN_VERSION: 1.8.2
        run: |
          curl -fsSL -o bartman.vsix \
            "https://bartmanabyss.gallery.vsassets.io/_apis/public/gallery/publisher/bartmanabyss/extension/amiga-debug/${BARTMAN_VERSION}/assetbyname/Microsoft.VisualStudio.Services.VSIXPackage"
          unzip -q bartman.vsix -d bartman
          rm bartman.vsix

      - name: Build with Bartman toolchain
        run: |
          BARTMAN="$PWD/bartman/extension/bin/linux"
          chmod +x "$BARTMAN/elf2hunk" "$BARTMAN/opt/bin/"*
          find "$BARTMAN/opt/libexec" -type f -exec chmod +x {} +
          make TOOLCHAIN=bartman BARTMAN="$BARTMAN"

      - name: Upload binary + icon
        uses: actions/upload-artifact@v4
        with:
          name: DiskPart
          path: |
            out/DiskPart
            out/DiskPart.info
          if-no-files-found: error

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built binary
        uses: actions/download-artifact@v4
        with:
          name: DiskPart
          path: out

      - name: Set release date
        id: date
        run: echo "DATE=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Create LHA archive
        run: |
          ARCHIVE="DiskPart-${{ steps.date.outputs.DATE }}-PROTO.lha"
          python3 support/make_lha.py "$ARCHIVE" \
            "DiskPart:out/DiskPart" \
            "DiskPart.info:out/DiskPart.info" \
            "README.md:README.md"
          ls -lh "$ARCHIVE"

      - name: Delete previous PROTO release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete proto --yes 2>/dev/null || true
          git push --delete origin proto 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create proto \
            --title "DiskPart ${{ steps.date.outputs.DATE }} PROTO" \
            --notes "Automated prototype build from commit \`${{ github.sha }}\`." \
            --prerelease \
            "DiskPart-${{ steps.date.outputs.DATE }}-PROTO.lha"
